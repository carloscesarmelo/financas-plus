{% extends "base.html" %}
{% block title %}Criar conta · FINANÇAS+{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card card-glow">
    <div class="page-title center-text">Crie sua conta</div>
    <p class="page-subtitle center-text">Comece sua jornada de evolução financeira.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
      <label for="name">Nome</label>
      <input type="text" id="name" name="name" required />

      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" minlength="6" required />

      <button class="btn" type="submit" style="width: 100%">Criar conta</button>
    </form>

    <p class="page-subtitle center-text" style="margin-top: 20px">
      Já tem conta? <a href="/login">Entrar</a>
    </p>
  </div>
</div>
{% endblock %}
