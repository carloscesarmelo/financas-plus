{% extends "base.html" %}
{% block title %}Redefinir Senha · FINANÇAS+{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card card-glow">
    <div class="page-title center-text">FINANÇAS<span style="color: var(--neon)">+</span></div>
    <p class="page-subtitle center-text">Crie uma nova senha.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/reset-password">
      <input type="hidden" name="token" value="{{ token }}" />
      <label for="password">Nova senha</label>
      <input type="password" id="password" name="password" minlength="6" required />
      <button class="btn" type="submit" style="width: 100%">Redefinir senha</button>
    </form>
  </div>
</div>
{% endblock %}
