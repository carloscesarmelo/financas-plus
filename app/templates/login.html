{% extends "base.html" %}
{% block title %}Entrar · FINANÇAS+{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card card-glow">
    <div class="page-title center-text">FINANÇAS<span style="color: var(--neon)">+</span></div>
    <p class="page-subtitle center-text">Poupe, aprenda e faça dinheiro.</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <label for="email">E-mail</label>
      <input type="email" id="email" name="email" required />

      <label for="password">Senha</label>
      <input type="password" id="password" name="password" required />

      <button class="btn" type="submit" style="width: 100%">Entrar</button>
    </form>

    <p class="page-subtitle center-text" style="margin-top: 20px">
      Ainda não tem conta? <a href="/register">Cadastre-se</a>
    </p>
  </div>
</div>
{% endblock %}
